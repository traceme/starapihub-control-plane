# Minimal test stack: New-API + Bifrost + Postgres + Redis
# Used by integration tests. No TLS, no nginx, no ClewdR.
# All ports exposed on localhost for test access.

services:
  postgres:
    image: postgres:16-alpine
    container_name: test-postgres
    environment:
      POSTGRES_USER: newapi
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: newapi
    ports:
      - "127.0.0.1:15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newapi"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: test-redis
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  new-api:
    image: calciumion/new-api:${NEWAPI_VERSION:-latest}
    container_name: test-new-api
    ports:
      - "127.0.0.1:13000:3000"
    environment:
      SQL_DSN: "postgresql://newapi:testpass@postgres:5432/newapi"
      REDIS_CONN_STRING: "redis://redis:6379/0"
      SESSION_SECRET: "integration-test-session-secret-not-for-production"
      TZ: UTC
      BATCH_UPDATE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -q 'success' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  bifrost:
    image: maximhq/bifrost:${BIFROST_VERSION:-latest}
    container_name: test-bifrost
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      LOG_STYLE: json
      LOG_LEVEL: debug
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
