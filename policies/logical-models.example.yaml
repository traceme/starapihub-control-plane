# Logical Model Registry
#
# This file defines the logical model names exposed to clients.
# Logical models are stable abstractions over provider-specific model IDs.
# They map to New-API channels and Bifrost route policies.
#
# This registry lives OUTSIDE the upstream systems. It is the single
# source of truth for what models the platform offers, their risk
# classification, and access controls.
#
# Required fields per model:
#   display_name      — Human-readable name shown in docs and dashboards
#   billing_name      — Name used in New-API billing records (usually same as model key)
#   risk_level        — low | medium | high (determines ClewdR eligibility)
#   allowed_groups    — List of user groups that may access this model
#   channel           — New-API channel name (bifrost-premium | bifrost-standard | bifrost-risky)
#   route_policy      — Bifrost route policy from route-policies.example.yaml
#   unofficial_allowed — Whether ClewdR/unofficial providers may serve this model
#   caching_allowed   — Whether Bifrost semantic caching may be used
#
# After editing, propagate changes:
#   1. Update New-API channel model lists and model_mapping JSON
#   2. Update Bifrost provider key model arrays and routing rules
#   See docs/config-sync.md for the full sync procedure.

models:

  # ────────────────────────────────────────────────────────────
  # PREMIUM TIER — Official API providers only, SLA-backed
  # Channel: bifrost-premium | Policy: premium
  # ────────────────────────────────────────────────────────────

  claude-sonnet:
