# Local development Nginx config — HTTP only, no TLS
# Use this instead of nginx.conf for local dev/testing.
#
# Usage: mount this as nginx.conf in docker-compose.override.yml

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Generate X-Request-ID if not provided by the client
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    log_format main '$remote_addr [$time_local] "$request" $status '
                    'req_id=$req_id upstream=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=api_inference:10m rate=30r/s;

    # Upstream: only New-API
    include /etc/nginx/conf.d/*.conf;

    # ── HTTP Server (local dev) ─────────────────────────────
    server {
        listen 80;
        server_name localhost;

        add_header X-Request-ID $req_id always;

        # Block internal service paths (defense-in-depth)
        location ~* ^/(bifrost|clewdr|internal)/ {
            return 403 '{"error": "forbidden"}';
            add_header Content-Type application/json always;
        }

        # Health check
        location = /health {
            access_log off;
            proxy_pass http://new_api/api/status;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Inference endpoints (stricter rate limit)
        location ~ ^/v1/(chat/completions|completions|embeddings|images|audio) {
            limit_req zone=api_inference burst=10 nodelay;

            proxy_pass http://new_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection "";

            # SSE streaming
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }

        # All other routes -> New-API
        location / {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://new_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header Connection "";

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }
    }
}
