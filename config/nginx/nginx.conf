# Nginx configuration for the external control plane
# This is the ONLY internet-facing component.
# All traffic enters through Nginx and is proxied to New-API.
# Bifrost and ClewdR are NEVER exposed publicly.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Request ID mapping ────────────────────────────────
    # Generate X-Request-ID if not provided by the client.
    # Must be in the http{} block (not server{}).
    map $http_x_request_id $req_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # ── Logging ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'req_id=$req_id '
                    'upstream_time=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── General ───────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Allow large request bodies for file uploads and long prompts
    client_max_body_size 100m;

    # ── Rate limiting ─────────────────────────────────────
    # Basic rate limiting at the ingress level.
    # New-API also enforces per-token rate limits internally.
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=api_inference:10m rate=30r/s;

    # ── Upstream definitions ──────────────────────────────
    # Loaded from conf.d/ for modularity
    include /etc/nginx/conf.d/*.conf;

    # ── HTTPS Server ──────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.example.com;  # CHANGE THIS to your domain

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ──────────────────────────────
        add_header X-Request-ID $req_id always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # ── Block direct access to internal services ──────
        # These paths should never be reachable from the internet.
        # Defense-in-depth: even though Bifrost and ClewdR are on
        # separate Docker networks, we block any path that could
        # hint at internal service names.
        location ~* ^/(bifrost|clewdr|internal)/ {
            return 403 '{"error": "forbidden", "message": "internal service not publicly accessible"}';
            add_header Content-Type application/json always;
        }

        # ── Health check endpoint for load balancers ──────
        location = /health {
            access_log off;
            proxy_pass http://new_api/api/status;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── API inference endpoints (stricter rate limit) ─
        # Chat completions and other inference calls
        location ~ ^/v1/(chat/completions|completions|embeddings|images|audio) {
            limit_req zone=api_inference burst=10 nodelay;

            proxy_pass http://new_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Request correlation: inject ID in both formats for cross-layer tracing
            # New-API uses X-Oneapi-Request-Id internally (generates its own, ignores incoming)
            # Bifrost reads x-request-id (falls back to UUID if absent)
            # See docs/observability.md for evidence and correlation strategy
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header X-Oneapi-Request-Id $req_id;
            proxy_set_header Connection "";

            # SSE streaming support — critical for chat completions
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;  # Match STREAMING_TIMEOUT in new-api.env
            chunked_transfer_encoding on;
        }

        # ── All other routes -> New-API ───────────────────
        # Covers /api/*, /v1/*, admin UI, dashboard, etc.
        location / {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://new_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Request correlation: inject ID in both formats for cross-layer tracing
            # New-API uses X-Oneapi-Request-Id internally (generates its own, ignores incoming)
            # Bifrost reads x-request-id (falls back to UUID if absent)
            # See docs/observability.md for evidence and correlation strategy
            proxy_set_header X-Request-ID $req_id;
            proxy_set_header X-Oneapi-Request-Id $req_id;
            proxy_set_header Connection "";

            # SSE support for non-inference streaming endpoints
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            chunked_transfer_encoding on;
        }
    }

    # ── HTTP -> HTTPS redirect ────────────────────────────
    server {
        listen 80;
        server_name api.example.com;  # CHANGE THIS to your domain
        return 301 https://$host$request_uri;
    }
}
