# Upstream definitions for the control plane reverse proxy
#
# Only New-API is defined here because it is the sole backend
# reachable from the public nginx instance.
#
# Bifrost and ClewdR are NOT upstream targets for nginx.
# They are on separate Docker networks (core-net, provider-net)
# and are unreachable from nginx by design.

# ── New-API upstream ──────────────────────────────────────
# Single instance. For multi-instance deployments, add more
# server entries and configure load balancing (e.g., least_conn).
upstream new_api {
    server new-api:3000;

    # HTTP/1.1 keepalive connections to reduce TCP overhead
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ── Notes on internal services ────────────────────────────
#
# The following services are internal-only and do NOT get
# upstream blocks in nginx:
#
#   bifrost    (core-net, port 8080)
#     - Reached by New-API directly via http://bifrost:8080
#     - New-API channels are configured with this base URL
#
#   clewdr-1   (provider-net, port 8484)
#   clewdr-2   (provider-net, port 8484)
#   clewdr-3   (provider-net, port 8484)
#     - Reached by Bifrost directly via http://clewdr-N:8484
#     - Bifrost provider config uses these as base URLs
#
# Request path:
#   Client -> nginx -> New-API -> Bifrost -> ClewdR / official APIs
#
# Adding upstream blocks here for bifrost or clewdr would be
# a security violation of the network segmentation design.
